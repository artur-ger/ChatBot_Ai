<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ИИ чат поддержки</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260519-split" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="app app-narrow">
      <header class="topbar">
        <div>
          <p class="eyebrow">ChatBot AI</p>
          <h1>Чат поддержки</h1>
        </div>
        <a id="adminLink" class="topbar-link hidden" href="/admin">Админ-панель</a>
      </header>

      <main class="layout layout-single">
        <section class="card chat-card">
          <div class="section-head">
            <h2>Чат</h2>
          </div>
          <p id="chatSessionHint" class="muted chat-session-hint"></p>
          <div id="messages" class="messages messages-tall"></div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" placeholder="Введите вопрос..." required minlength="2" />
            <button type="submit">Отправить</button>
          </form>
          <div class="actions">
            <button id="newChatBtn" type="button" class="btn-secondary">Новый диалог</button>
            <button id="resetChatBtn" type="button" class="danger">Очистить историю</button>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/common.js?v=20260526-rollout"></script>
    <script src="/static/chat.js?v=20260528-no-sources"></script>
  </body>
</html>
