services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    pull_policy: missing
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot_ai
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    pull_policy: missing
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    # Образ должен совпадать по major/minor с пакетом chromadb в poetry.lock (сейчас ~1.5.x), иначе 404 на /api/v2/...
    image: ${CHROMA_IMAGE:-chromadb/chroma:1.5.8}
    pull_policy: missing
    container_name: chatbot-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    # Часто чинит резолвинг внешних хостов при VPN / «ломком» DNS Docker Desktop.
    dns:
      - 8.8.8.8
      - 1.1.1.1

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - huggingface_cache:/app/data/huggingface
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHAT_ACL_DISABLED=true
      - HF_HOME=/app/data/huggingface
      # Токен из .env рядом с compose (для gated-моделей). Пустое значение допустимо.
      - HF_TOKEN=${HF_TOKEN:-}
      # Переключатель без правки файла: в .env можно задать USE_FAKE_EMBEDDINGS=true
      - USE_FAKE_EMBEDDINGS=${USE_FAKE_EMBEDDINGS:-false}

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-worker
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - huggingface_cache:/app/data/huggingface
      - uploads_data:/app/data/uploads
    command: ["sh", "-c", "poetry run celery -A app.workers.celery_app worker -l INFO"]
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHAT_ACL_DISABLED=true
      - HF_HOME=/app/data/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
      - USE_FAKE_EMBEDDINGS=${USE_FAKE_EMBEDDINGS:-false}

  telegram-bot:
    build:
      context: telegram_bot
      dockerfile: Dockerfile
    container_name: chatbot-telegram-bot
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      backend:
        condition: service_started
    volumes:
      - telegram_bot_data:/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CORE_API_BASE_URL=http://backend:8000/api/v1
      - BOT_STORAGE_PATH=/app/data/bot.sqlite3
      - BOT_REQUEST_TIMEOUT_SECONDS=10
      - BOT_UPLOAD_POLL_INTERVAL_SECONDS=2
      - BOT_UPLOAD_POLL_ATTEMPTS=30
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  huggingface_cache:
  uploads_data:
  telegram_bot_data:
