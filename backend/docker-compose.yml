services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    pull_policy: missing
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot_ai
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    pull_policy: missing
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: ${CHROMA_IMAGE:-chromadb/chroma:1.5.8}
    pull_policy: missing
    container_name: chatbot-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    dns:
      - 8.8.8.8
      - 1.1.1.1

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: chatbot-backend
    env_file:
      - path: ../.env
        required: false
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - huggingface_cache:/app/.cache/huggingface
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - HF_HOME=/app/.cache/huggingface
      - LLM_BOOTSTRAP_DEFAULT=true
    command: ["sh", "-c", "mkdir -p /app/.cache/huggingface /app/data/uploads && chmod -R 0777 /app/.cache/huggingface /app/data/uploads && poetry run alembic upgrade head && poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: chatbot-worker
    env_file:
      - path: ../.env
        required: false
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - worker_huggingface_cache:/app/.cache/huggingface
      - uploads_data:/app/data/uploads
    command: ["sh", "-c", "mkdir -p /app/.cache/huggingface /app/data/uploads && chmod -R 0777 /app/.cache/huggingface /app/data/uploads && poetry run celery -A app.workers.celery_app worker -l INFO --concurrency=1"]
    healthcheck:
      test: ["CMD-SHELL", "poetry run celery -A app.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - HF_HOME=/app/.cache/huggingface

  telegram-bot:
    profiles:
      - telegram
    build:
      context: telegram_bot
      dockerfile: Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: chatbot-telegram-bot
    env_file:
      - path: ../.env
        required: false
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - telegram_bot_data:/app/data
    environment:
      - CORE_API_BASE_URL=http://backend:8000/api/v1
      - BOT_STORAGE_PATH=/app/data/bot.sqlite3
      - BOT_REQUEST_TIMEOUT_SECONDS=10
      - BOT_UPLOAD_POLL_INTERVAL_SECONDS=2
      - BOT_UPLOAD_POLL_ATTEMPTS=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://backend:8000/healthz', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  chroma_data:
  huggingface_cache:
  worker_huggingface_cache:
  uploads_data:
  telegram_bot_data:
